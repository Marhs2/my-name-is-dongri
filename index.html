<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="game">
    <h1>Snake Game</h1>
    <p>Use arrow keys or WASD to move. Press Space to restart.</p>
    <canvas id="board" width="400" height="400" aria-label="Snake game board"></canvas>
    <div class="status">
      <span aria-live="polite">Score: <strong id="score">0</strong></span>
      <span id="message" role="status" aria-live="polite"></span>
    </div>
  </main>
  <script src="./script.js"></script>
</body>
</html>
